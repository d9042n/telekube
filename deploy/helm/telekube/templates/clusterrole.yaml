{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "telekube.fullname" . }}
  labels:
    {{- include "telekube.labels" . | nindent 4 }}
rules:
  # Read: pods, pods/log, events, namespaces, nodes
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  # Read: deployments, statefulsets, replicasets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Write: pods (restart = delete), only pods managed by controllers
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Write: deployments/scale, statefulsets/scale
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Leader election (for HA in future)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
{{- end }}
