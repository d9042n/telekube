apiVersion: v1
kind: Pod
metadata:
  name: oomkill-pod
  namespace: default
  labels:
    app: oomkill-pod
    e2e: "true"
spec:
  containers:
    - name: memory-hog
      image: polinux/stress:latest
      # Allocate 200MB in 1MB chunks — the 64Mi limit will OOMKill it
      command: ["stress", "--vm", "1", "--vm-bytes", "200M", "--vm-keep"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  restartPolicy: Always
