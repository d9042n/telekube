apiVersion: v1
kind: Pod
metadata:
  name: crash-pod
  namespace: default
  labels:
    app: crash-pod
    e2e: "true"
spec:
  containers:
    - name: crasher
      image: busybox:1.37
      command: ["sh", "-c", "exit 1"]
      resources:
        requests:
          cpu: "10m"
          memory: "8Mi"
        limits:
          cpu: "50m"
          memory: "16Mi"
  restartPolicy: Always
